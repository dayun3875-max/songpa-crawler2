name: auto_run

on:
  schedule:
    - cron: '0 2 * * *'   # 한국시간 오전 11시
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 실행
        run: 0316_songpa.py
